version: '3.8'
services:

  postgres:
    image: postgres:15-alpine
    container_name: socialapi-postgres
    environment:
      POSTGRES_DB: socialapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: socialapi-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
